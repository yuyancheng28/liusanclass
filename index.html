<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六三class</title>
    <style>
        /* 全局重置与背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1b2b 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* 容器 */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. 登录/注册界面 (默认显示) --- */
        .auth-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 20, 30, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
            padding: 20px;
        }

        /* 添加模糊背景效果 */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
        }

        .auth-logo {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #4CAF50;
        }

        .auth-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #ccc;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background-color: #FF9800;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .auth-btn:hover {
            background-color: #E68900;
        }

        /* --- 2. 主页内容 (默认隐藏) --- */
        .main-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0; /* 初始透明 */
            pointer-events: none; /* 初始不可点击 */
            transition: opacity 0.5s ease-out;
        }

        /* 左侧公告栏 */
        .sidebar {
            width: 300px;
            height: 100vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            padding: 30px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 1.5rem;
        }

        .sidebar p {
            line-height: 1.8;
            font-size: 14px;
            color: #ddd;
        }

        /* 右侧按钮区域 */
        .button-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100vh;
            padding: 20px;
        }

        .nav-btn {
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            padding: 18px 50px;
            border-radius: 10px;
            font-size: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            width: 250px;
            border: 2px solid #388E3C;
        }

        .nav-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            background-color: #388E3C;
        }

        .nav-btn:nth-child(1) { background-color: #2196F3; border-color: #1976D2; }
        .nav-btn:nth-child(2) { background-color: #9C27B0; border-color: #7B1FA2; }
        .nav-btn:nth-child(3) { background-color: #FF5722; border-color: #D84315; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 1. 登录界面 -->
        <div class="auth-container" id="loginLayer">
            <div class="auth-logo">🔓 欢迎登录</div>
            <form class="auth-form" onsubmit="login(event)">
                <div class="form-group">
                    <input type="text" placeholder="学号" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="姓名简写，张三：zhangsan" required>
                </div>
                <button type="submit" class="auth-btn">登录</button>
            </form>
        </div>

        <!-- 2. 主页内容 -->
        <div class="main-container" id="mainContent">
            
            <!-- 左侧公告栏 -->
            <div class="sidebar">
                <h2>📢 公告</h2>
                <p>欢迎来到 yyc为大家制作的<strong>网页同学录</strong>！</p>
            </div>

            <!-- 右侧功能按钮 -->
            <div class="button-container">
                <a href="liusanclass.qzz.io/liuyan" target="_blank" class="nav-btn">跳转毕业留言册</a>
                <a href="" target="_blank" class="nav-btn">跳转各同学信息（暂不可用）</a>
                <a href="" class="nav-btn">跳转到关于页（暂不可用）</a>
            </div>
        </div>
    </div>

    <script>
        function login(event) {
            event.preventDefault(); // 阻止表单默认提交
            
            // 获取元素
            const loginLayer = document.getElementById('loginLayer');
            const mainContent = document.getElementById('mainContent');

            // 模拟登录成功后的动画效果
            loginLayer.style.transform = 'translateY(-100%)'; // 向上滑出
            loginLayer.style.opacity = '0';

            // 延迟后显示主页
            setTimeout(() => {
                mainContent.style.opacity = '1';
                mainContent.style.pointerEvents = 'auto';
            }, 500);
        }
    </script>

</body>
</html>
