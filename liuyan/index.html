<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业留言册 - 青春纪念</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .message-board {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 30px;
        }

        .message-display {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 400px;
            position: relative;
        }

        .message-card {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .message-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .message-card:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .message-author {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .message-content {
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .message-time {
            color: #666;
            font-size: 0.85rem;
            text-align: right;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .edit-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .edit-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .message-list {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .message-list h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .mini-message {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            position: relative; /* 为绝对定位按钮提供基准 */
        }

        .mini-message:hover {
            background: #e9ecef;
            border-left-color: #667eea;
            transform: translateX(5px);
        }

        .mini-message.active {
            background: #e3f2fd;
            border-left-color: #667eea;
        }

        .mini-author {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .mini-content {
            color: #666;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 【新增】删除按钮样式 */
        .delete-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* 鼠标悬停在留言条目上时显示删除按钮 */
        .mini-message:hover .delete-btn {
            opacity: 1;
        }

        @media (max-width: 992px) {
            .message-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 毕业留言册 - 青春永不散场</h1>

        <div class="message-board">
            <!-- 留言展示区域 -->
            <div class="message-display">
                <div id="messageCard" class="message-card active">
                    <div class="message-author" id="currentAuthor">点击右侧或下方列表查看留言</div>
                    <div class="message-content" id="currentContent">欢迎来到毕业留言册，在这里留下你对同学的祝福和回忆吧！</div>
                    <div class="message-time" id="currentTime"></div>
                </div>

                <div class="navigation">
                    <button class="nav-btn" id="prevBtn" disabled>← 上一条</button>
                    <span id="messageCount">第 0 条 / 共 0 条</span>
                    <button class="nav-btn" id="nextBtn" disabled>下一条 →</button>
                </div>
            </div>

            <!-- 留言编辑区域 -->
            <div class="edit-panel">
                <h2>✍️ 留下你的祝福</h2>
                <form id="messageForm">
                    <div class="form-group">
                        <label for="author">你的名字</label>
                        <input type="text" id="author" required placeholder="请输入你的名字">
                    </div>
                    <div class="form-group">
                        <label for="content">留言内容</label>
                        <textarea id="content" required placeholder="写下你想对同学们说的话..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">提交留言</button>
                </form>
            </div>
        </div>

        <!-- 留言列表区域 -->
        <div class="message-list">
            <h2>📋 全部留言</h2>
            <div id="messageList"></div>
        </div>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem('graduationMessages')) || [];
        const messageCard = document.getElementById('messageCard');
        const currentAuthor = document.getElementById('currentAuthor');
        const currentContent = document.getElementById('currentContent');
        const currentTime = document.getElementById('currentTime');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const messageCount = document.getElementById('messageCount');
        const messageForm = document.getElementById('messageForm');
        const authorInput = document.getElementById('author');
        const contentInput = document.getElementById('content');
        const messageList = document.getElementById('messageList');
        let currentIndex = 0;

        // 【新增】删除留言函数
        function deleteMessage(index) {
            // 确认删除
            if (!confirm("确定要删除这条留言吗？")) return;

            // 从数组中移除
            messages.splice(index, 1);

            // 调整当前索引
            if (currentIndex >= messages.length) {
                currentIndex = messages.length - 1;
                if (currentIndex < 0) currentIndex = 0;
            }

            // 更新界面和存储
            updateMessageDisplay();
            updateNavigation();
            updateMessageList();
            saveToLocalStorage();
            
            alert("留言已删除！");
        }

        function init() {
            updateMessageDisplay();
            updateNavigation();
            updateMessageList();
            saveToLocalStorage();
        }

        function updateMessageDisplay() {
            if (messages.length === 0) {
                currentAuthor.textContent = "暂无留言";
                currentContent.textContent = "快来成为第一个留言的人吧！";
                currentTime.textContent = "";
                return;
            }

            const message = messages[currentIndex];
            currentAuthor.textContent = message.author;
            currentContent.textContent = message.content;
            currentTime.textContent = message.time;
            messageCard.classList.remove('active');
            setTimeout(() => {
                messageCard.classList.add('active');
            }, 100);
        }

        function updateNavigation() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === messages.length - 1;
            messageCount.textContent = `第 ${currentIndex + 1} 条 / 共 ${messages.length} 条`;
        }

        function updateMessageList() {
            messageList.innerHTML = '';

            messages.forEach((message, index) => {
                const miniMessage = document.createElement('div');
                miniMessage.className = `mini-message ${index === currentIndex ? 'active' : ''}`;
                // 【修改】在 HTML 模板中加入删除按钮
                miniMessage.innerHTML = `
                    <div class="mini-author">${message.author}</div>
                    <div class="mini-content">${message.content}</div>
                    <!-- 【新增】添加删除按钮，绑定点击事件 -->
                    <button class="delete-btn" onclick="deleteMessage(${index})">删除</button>
                `;
                miniMessage.addEventListener('click', () => {
                    currentIndex = index;
                    updateMessageDisplay();
                    updateNavigation();
                    updateMessageList();
                });
                messageList.appendChild(miniMessage);
            });

            if (messages.length === 0) {
                messageList.innerHTML = '<p style="text-align: center; color: #999;">暂无留言，快来添加第一条吧！</p>';
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('graduationMessages', JSON.stringify(messages));
        }

        messageForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const author = authorInput.value.trim();
            const content = contentInput.value.trim();

            if (!author || !content) return;

            const now = new Date();
            const time = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            const newMessage = { author, content, time };
            messages.push(newMessage);
            currentIndex = messages.length - 1;
            authorInput.value = '';
            contentInput.value = '';
            updateMessageDisplay();
            updateNavigation();
            updateMessageList();
            saveToLocalStorage();
            alert('留言提交成功！');
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateMessageDisplay();
                updateNavigation();
                updateMessageList();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < messages.length - 1) {
                currentIndex++;
                updateMessageDisplay();
                updateNavigation();
                updateMessageList();
            }
        });

        init();
    </script>
</body>
</html>
